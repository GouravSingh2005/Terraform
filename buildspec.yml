version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to ECR
      - aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin 585008053787.dkr.ecr.ap-southeast-1.amazonaws.com

  build:
    commands:
      - echo Building backend
      - docker build -t backend ./backend
      - docker tag backend:latest 585008053787.dkr.ecr.ap-southeast-1.amazonaws.com/backend:latest

      - echo Building frontend
      - docker build -t frontend ./frontend
      - docker tag frontend:latest 585008053787.dkr.ecr.ap-southeast-1.amazonaws.com/frontend:latest

  post_build:
    commands:
      - echo Pushing images
      - docker push 585008053787.dkr.ecr.ap-southeast-1.amazonaws.com/backend:latest
      - docker push 585008053787.dkr.ecr.ap-southeast-1.amazonaws.com/frontend:latest
